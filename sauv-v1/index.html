<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro.lu - Votre Horoscope Quotidien</title>
    <meta name="description" content="Découvrez votre horoscope quotidien gratuit sur Astro.lu. Amour, travail, santé : les astres vous guident.">
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Icons (Lucide via UNPKG pour simplicité) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container header-content">
            <div class="logo" onclick="app.showHome()">
                <i data-lucide="moon" class="logo-icon"></i>
                <span>Astro.lu</span>
            </div>
            <div class="date-display" id="current-date"></div>
        </div>
    </header>

    <main class="container">
        <!-- VUE ACCUEIL : Grille des signes -->
        <section id="view-home" class="view active">
            <div class="hero">
                <h1>ASTRO.LU</h1>
                <p>Sélectionnez votre signe pour découvrir les prévisions du jour.</p>
            </div>
            
            <div class="zodiac-grid" id="zodiac-grid">
                <!-- Les cartes seront générées ici par JS -->
            </div>
        </section>

        <!-- VUE DÉTAIL : Horoscope -->
        <section id="view-sign" class="view hidden">
            <button class="btn-back" onclick="app.showHome()">
                <i data-lucide="arrow-left"></i> Retour aux signes
            </button>

            <div id="horoscope-content" class="horoscope-layout">
                <!-- Le contenu sera injecté ici par JS -->
                <div class="loading">Lecture des astres...</div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Astro.lu - Horoscope Professionnel.</p>
            <div class="footer-links">
                <a href="#">Mentions Légales</a>
                <a href="#">Confidentialité</a>
            </div>
        </div>
    </footer>

    <!-- Script Principal -->
    <script src="script.js"></script>
    <script>
        // Initialisation des icônes
        lucide.createIcons();
    </script>
</body>
</html>
